name: CI
on:
  push:
    branches: ["review/**", "chore/**"]
  pull_request:
    branches: ["main"]
permissions:
  contents: read
  pull-requests: write
jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: P2-043B EV-gate test (gating)
        id: gate
        run: |
          set -o pipefail
          python -m pytest tests/test_p2_043b_fee_adjusted_ev_gate.py -q | tee gate.log
      - name: Full suite (informational)
        id: full
        continue-on-error: true
        run: |
          python -m pytest -q | tee full.log || true
      - name: Comment results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = f => { try { return fs.readFileSync(f,'utf8').trim().split('\n').slice(-15).join('\n'); } catch(e){ return '(no output)'; } };
            const gate = '${{ steps.gate.outcome }}';
            const full = '${{ steps.full.outcome }}';
            const body = [
              '## CI results',
              `**P2-043B EV-gate (gating):** ${gate === 'success' ? '✅ pass' : '❌ fail'}`,
              `**Full suite (informational):** ${full === 'success' ? '✅ pass' : '⚠️ see log'}`,
              '', '<details><summary>gate tail</summary>', '', '```', tail('gate.log'), '```', '</details>',
              '<details><summary>full suite tail</summary>', '', '```', tail('full.log'), '```', '</details>'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });
