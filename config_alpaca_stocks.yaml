# =============================================================
# Alpaca Stocks-Only Config
# =============================================================
# Use this config when running the Alpaca broker (BROKER=alpaca).
# Crypto is DISABLED — Alpaca does not support crypto in this state.
# Equities are live-enabled; options gated behind broker approval.
# Start in PAPER mode until you have confidence in the strategy.
#
# Usage:
#   CONFIG_FILE=config_alpaca_stocks.yaml BROKER=alpaca python main.py --mode paper
#   CONFIG_FILE=config_alpaca_stocks.yaml BROKER=alpaca python main.py --mode live

# ── Runtime mode ─────────────────────────────────────────────
mode: live     # LIVE: real Alpaca stock/ETF orders allowed only with LIVE_TRADING=true

# ── Account expectations ─────────────────────────────────────
account:
  expected_starting_equity: 8.00
  disable_live_below_equity: 1.50
  do_not_auto_increase_size_until_equity: 20.00
  timezone: America/Chicago

# ── Live-trading master gates ─────────────────────────────────
live_trading:
  enabled: true
  require_env_live_trading_true: true
  allow_crypto: false              # DISABLED — not available in this state
  allow_equities: true             # ENABLED for Alpaca stocks
  allow_long_options: true         # Level 1 approved 2026-05-23
  allow_short_selling: false       # requires $2000+ equity
  allow_margin: false              # requires $2000+ equity

# ── Global risk limits ────────────────────────────────────────
global_risk:
  max_daily_loss_usd: 2.00
  max_trades_per_day: 5
  stop_after_consecutive_losses: 2
  max_open_positions: 4
  max_total_live_exposure_usd: 6.00
  no_new_trades_after_market_time: "14:45"
  force_flat_before_market_close: true
  force_flat_time: "14:55"
  never_hold_options_through_expiration: true
  max_api_errors_before_halt: 10

# ── Crypto ───────────────────────────────────────────────────
crypto:
  enabled: false    # Completely disabled for Alpaca broker
  live_enabled: false
  live_symbols: []
  watch_only_symbols: []
  symbols: []

# ── Fee model ────────────────────────────────────────────────
# Alpaca equities: $0 commission on stocks/ETFs. Options: $0.65/contract.
fees:
  venue: "alpaca_equities"
  maker_fee_pct: 0.0000       # zero-commission equities
  taker_fee_pct: 0.0000
  require_expected_edge_pct: 0.005   # 0.5% minimum net edge (covers spread + slippage)
  require_worst_case_edge_positive: true

# ── Risk thresholds ───────────────────────────────────────────
risk:
  min_reward_risk_ratio: 1.4
  require_stop_loss: true
  require_take_profit: true

# ── Equities ─────────────────────────────────────────────────
equities:
  enabled: true
  live_enabled: true
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
  max_trade_notional_usd: 2.00
  max_total_equity_exposure_usd: 4.00
  min_trade_notional_usd: 0.50
  use_fractional_notional: true
  allow_extended_hours: false
  allow_penny_stocks: false
  allow_leveraged_etfs: false
  max_spread_pct: 0.10      # tight — liquid large-caps only
  stale_data_seconds: 15
  starter_movement_enabled: true
  starter_symbols:
    - SPY
    - QQQ
  starter_notional_usd: 1.00
  starter_stop_loss_pct: 0.75
  starter_take_profit_pct: 1.20

# ── Options (gated behind broker approval) ───────────────────
options:
  enabled: true
  live_enabled: true
  require_broker_options_approval: true
  allowed_live_strategies:
    - long_call
    - long_put
  disallowed_strategies:
    - naked_short_call
    - naked_short_put
    - undefined_risk_spread
    - hold_through_expiration
  max_premium_per_trade_usd: 2.00   # small account — tight premium cap
  max_contracts: 1
  min_days_to_expiration: 2
  max_days_to_expiration: 21
  never_hold_through_expiration: true
  force_close_before_expiration_days: 1

# ── Short selling (gated behind equity threshold) ────────────
short_selling:
  enabled: true
  live_enabled: false
  minimum_equity_required_usd: 2000.00
  require_asset_shortable: true
  require_easy_to_borrow: true
  disallow_hard_to_borrow: true
  max_short_notional_usd: 25.00

# ── Margin (gated behind equity threshold) ───────────────────
margin:
  enabled: true
  live_enabled: false
  minimum_equity_required_usd: 2000.00
  max_margin_utilization_pct: 10
  never_use_full_buying_power: true

# ── Strategy behaviour ────────────────────────────────────────
strategy_thresholds:
  use_regime_filter: true
  use_atr_exits: true
  confidence_threshold:
    momentum_breakout: 0.70
    ema_crossover: 0.68
    mean_reversion: 0.72

strategy:
  allow_autonomous_selection: true
  prefer_no_trade_when_unclear: true
  equity_strategies:
    - starter_movement
    - momentum_breakout
    - vwap_reversion
  options_strategies:
    - directional_long_premium_only
  min_confidence_score: 0.55
  lookback_bars: 20
  equity_timeframe: "5Min"

# ── Logging ───────────────────────────────────────────────────
logging:
  journal_file: journal_alpaca_stocks.csv
  log_dir: logs
  report_dir: reports
  log_skipped_trades: true
  log_market_snapshot: true
  daily_report: true
  log_level: INFO
