# =============================================================
# Alpaca Autonomous Micro-Trading Bot — Configuration
# =============================================================
# Edit conservatively. Risk limits apply to LIVE mode only
# in terms of real capital, but they also gate paper trades
# for behavioural consistency.

# ── Runtime mode ─────────────────────────────────────────────
# Options: dry_run | paper | live
# Live additionally requires LIVE_TRADING=true in .env
mode: live

# ── Account expectations ─────────────────────────────────────
account:
  expected_starting_equity: 8.00
  # Stop live trading if equity drops below this
  disable_live_below_equity: 1.50
  # Do NOT auto-increase size below this equity (must be manually bumped)
  do_not_auto_increase_size_until_equity: 20.00
  timezone: America/Chicago

# ── Live-trading master gates ─────────────────────────────────
live_trading:
  enabled: true                       # must also be true in .env
  require_env_live_trading_true: true # double-lock; do not disable
  allow_crypto: true
  allow_equities: false               # paper only until manually enabled
  allow_long_options: true            # Level 1 approved 2026-05-23
  allow_short_selling: false          # requires $2000+ equity
  allow_margin: false                 # requires $2000+ equity

# ── Global risk limits ────────────────────────────────────────
global_risk:
  max_daily_loss_usd: 2.00
  max_trades_per_day: 5
  stop_after_consecutive_losses: 2
  max_open_positions: 4
  max_total_live_exposure_usd: 6.00
  # No new entries after this market time (HH:MM in account timezone)
  no_new_trades_after_market_time: "14:45"
  # Force-close all non-crypto positions before market close
  force_flat_before_market_close: true
  force_flat_time: "14:55"
  never_hold_options_through_expiration: true
  # Halt trading if API errors exceed this count in one session
  max_api_errors_before_halt: 10

# ── Crypto ───────────────────────────────────────────────────
crypto:
  enabled: true
  live_enabled: true
  # live_symbols: actively traded; watch_only_symbols: scanned but no live orders placed
  # Promote DOGE/ALGO back to live only when journal proves positive net edge over 20+ trades.
  live_symbols:
    - BTC/USD
    - ETH/USD
    - SOL/USD
  watch_only_symbols:
    - DOGE/USD
    - ALGO/USD
  # Full symbol list (union) — used for market data scanning
  symbols:
    - BTC/USD
    - ETH/USD
    - SOL/USD
    - DOGE/USD
    - ALGO/USD
  max_trade_notional_usd: 2.00
  max_total_crypto_exposure_usd: 4.00
  min_trade_notional_usd: 0.50
  # Per-symbol spread limits (tighter than the old single 0.5% catch-all).
  # These reflect realistic maker spread for each asset.
  max_spread_pct_per_symbol:
    BTC/USD: 0.15
    ETH/USD: 0.18
    SOL/USD: 0.25
    DOGE/USD: 0.35
    ALGO/USD: 0.35
  # Fallback global spread limit if symbol not in per-symbol map
  max_spread_pct: 0.35
  # Reject quote if older than this many seconds.
  # 120s accommodates slower weekend/off-hours quote refresh rates while still
  # blocking truly stale data (e.g. a feed hours behind during an Alpaca outage).
  stale_data_seconds: 120
  use_limit_orders: true
  allow_market_orders: false
  # Position exit config — static fallback (overridden by ATR exits when atr_pct is available)
  stop_loss_pct: 1.50
  take_profit_pct: 2.50
  # Force-close position after this many minutes regardless of P/L
  max_position_minutes: 90
  # Passive limit entry: place order at best bid (maker side) to avoid taker fees
  passive_limit_entries: true

  # ── Dynamic sizing safety buffer ─────────────────────────────
  # Notional = min(max_trade, buying_power * buying_power_safety_buffer)
  # Prevents submitting orders that consume all available cash.
  buying_power_safety_buffer: 0.85

  # ── ATR-based dynamic exits ───────────────────────────────────
  use_atr_exits: true   # if false, falls back to static stop_loss_pct / take_profit_pct

  # ── Bar history ───────────────────────────────────────────────
  bars_limit: 100         # bars to fetch per scan
  min_bars_required: 75   # minimum before strategy fires

  # ── Slippage estimate ─────────────────────────────────────────
  slippage_estimate_pct: 0.05   # estimated % slippage on fill

# ── Fee model ────────────────────────────────────────────────
# Execution venue: Alpaca Crypto (not direct Coinbase).
# Alpaca Crypto fee tiers (verified 2026-05):
#   Maker: 0.15%  (passive limit order that rests on book)
#   Taker: 0.25%  (marketable limit that crosses the spread)
# The bot targets maker fills via passive bid-side entry.
# Worst-case assumes taker on both legs (limit marketable fill + market exit).
fees:
  venue: "alpaca_crypto"
  maker_fee_pct: 0.0015      # 0.15%
  taker_fee_pct: 0.0025      # 0.25%
  # Minimum acceptable net edge after fees, spread, slippage (in decimal, not %).
  # 0.006 = 0.6%. Proposals below this are rejected.
  require_expected_edge_pct: 0.006
  # If true, also reject when worst-case edge (taker both sides) is <= 0
  require_worst_case_edge_positive: true

# ── Risk thresholds ───────────────────────────────────────────
risk:
  # Minimum reward:risk ratio for any trade (target_pct / stop_pct)
  min_reward_risk_ratio: 1.4
  require_stop_loss: true
  require_take_profit: true

# ── Strategy behaviour ────────────────────────────────────────
# (overrides the strategy section below — these are the authoritative thresholds)
strategy_thresholds:
  use_regime_filter: true
  use_atr_exits: true
  # Per-strategy minimum confidence scores
  confidence_threshold:
    momentum_breakout: 0.70
    ema_crossover: 0.68
    mean_reversion: 0.72

# ── Equities (paper/dry-run only for now) ────────────────────
equities:
  enabled: true
  live_enabled: false
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
  max_trade_notional_usd: 3.00
  max_total_equity_exposure_usd: 6.00
  min_trade_notional_usd: 1.00
  use_fractional_notional: true
  allow_extended_hours: false
  allow_penny_stocks: false
  allow_leveraged_etfs: false
  max_spread_pct: 0.25
  stale_data_seconds: 15

# ── Options (gated behind broker approval) ───────────────────
options:
  enabled: true
  live_enabled: true              # Level 1 approved 2026-05-23
  require_broker_options_approval: true
  allowed_live_strategies:
    - long_call
    - long_put
  disallowed_strategies:
    - naked_short_call
    - naked_short_put
    - undefined_risk_spread
    - hold_through_expiration
  max_premium_per_trade_usd: 5.00
  max_contracts: 1
  min_days_to_expiration: 2
  max_days_to_expiration: 21
  never_hold_through_expiration: true
  force_close_before_expiration_days: 1

# ── Short selling (gated behind equity threshold) ────────────
short_selling:
  enabled: true
  live_enabled: false
  minimum_equity_required_usd: 2000.00
  require_asset_shortable: true
  require_easy_to_borrow: true
  disallow_hard_to_borrow: true
  max_short_notional_usd: 25.00

# ── Margin (gated behind equity threshold) ───────────────────
margin:
  enabled: true
  live_enabled: false
  minimum_equity_required_usd: 2000.00
  max_margin_utilization_pct: 10
  never_use_full_buying_power: true

# ── Strategy behaviour ────────────────────────────────────────
strategy:
  allow_autonomous_selection: true
  prefer_no_trade_when_unclear: true
  crypto_strategies:
    - momentum_breakout   # fires on price breakout above N-bar high with volume
    - mean_reversion      # fires when RSI < 35 and price at lower Bollinger Band
    - ema_crossover       # fires when EMA9 crosses above EMA21 (trend entry)
  equity_strategies:
    - momentum_breakout
    - vwap_reversion
  options_strategies:
    - directional_long_premium_only
  # Global fallback confidence floor (per-strategy thresholds in strategy_thresholds take precedence)
  min_confidence_score: 0.65
  # How many bars of history to use for signal calculation (lookback window within fetched bars)
  lookback_bars: 20
  # Bar timeframe for crypto
  crypto_timeframe: "5Min"

# ── Logging ───────────────────────────────────────────────────
logging:
  journal_file: journal.csv
  log_dir: logs
  report_dir: reports
  log_skipped_trades: true
  log_market_snapshot: true
  daily_report: true
  log_level: INFO    # DEBUG | INFO | WARNING | ERROR
