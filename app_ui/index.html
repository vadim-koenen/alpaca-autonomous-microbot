<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Accumulator</title>
<style>
  :root { --bg:#0a0b0d; --card:#16181d; --line:#23262e; --txt:#f4f5f8; --dim:#8a909c;
          --up:#27c08a; --upbg:#0e2a22; --down:#f6465d; --downbg:#2c1418; --accent:#3b7cff; }
  * { box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:var(--bg); color:var(--txt); }
  .wrap { max-width:480px; margin:0 auto; padding:14px 16px 40px; }
  .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .pill { font-size:11px; padding:4px 10px; border-radius:20px; background:#23262e; color:var(--dim); }
  .pill.ok { background:#15302a; color:var(--up); } .pill.live { background:#3a1f24; color:var(--down); }

  /* HERO — the one-glance answer */
  .hero { border-radius:22px; padding:26px 22px 24px; text-align:center; margin:6px 0 16px;
          border:1px solid var(--line); transition:background .4s; }
  .hero.up { background:linear-gradient(180deg,var(--upbg),#0d1417); border-color:#1d4a3b; }
  .hero.down { background:linear-gradient(180deg,var(--downbg),#0d1417); border-color:#4a1d24; }
  .hero.flat { background:var(--card); }
  .hero .cap { font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); }
  .hero .big { font-size:52px; font-weight:800; letter-spacing:-1.5px; margin:4px 0 8px; }
  .hero .pl { font-size:22px; font-weight:700; }
  .hero .today { font-size:13px; color:var(--dim); margin-top:8px; }
  .up { color:var(--up); } .down { color:var(--down); } .flatc { color:var(--dim); }

  /* WHAT'S MOVING IT */
  .move { display:flex; gap:10px; margin:0 0 16px; }
  .move .box { flex:1; background:var(--card); border:1px solid var(--line); border-radius:16px;
               padding:13px 14px; }
  .move .lbl { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; }
  .move .nm { font-size:15px; font-weight:600; margin-top:3px; }
  .move .amt { font-size:14px; font-weight:700; margin-top:2px; }

  /* ACTION */
  .invest { width:100%; border:0; border-radius:16px; padding:17px; font:inherit; font-size:17px;
            font-weight:700; color:#fff; background:var(--accent); cursor:pointer; margin:2px 0 8px; }
  .invest:disabled { opacity:.5; }
  .actnote { text-align:center; font-size:12px; color:var(--dim); min-height:16px; margin-bottom:18px; }

  /* HOLDINGS */
  .sect { font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--dim);
          margin:6px 4px 8px; }
  .hold { display:flex; align-items:center; justify-content:space-between; background:var(--card);
          border:1px solid var(--line); border-radius:14px; padding:13px 15px; margin-bottom:8px; }
  .hold .nm { font-weight:600; } .hold .qty { font-size:12px; color:var(--dim); }
  .hold .rt { text-align:right; } .hold .v { font-weight:600; font-variant-numeric:tabular-nums; }
  .hold .ch { font-size:12px; font-weight:600; }

  .alert { background:var(--downbg); border:1px solid #4a1d24; color:#ffc9c9; border-radius:14px;
           padding:12px 14px; font-size:13px; margin-bottom:14px; }
  .empty { text-align:center; color:var(--dim); padding:18px; font-size:14px; }
  .spark { height:54px; width:100%; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span id="tierPill" class="pill">…</span>
    <span id="modePill" class="pill">…</span>
  </div>

  <div id="alert" class="alert" style="display:none"></div>

  <div id="hero" class="hero flat">
    <div class="cap">Your money</div>
    <div class="big" id="big">$0.00</div>
    <div class="pl" id="pl">—</div>
    <div class="today" id="today"></div>
    <svg id="spark" class="spark" viewBox="0 0 460 54" preserveAspectRatio="none"></svg>
  </div>

  <div class="move" id="move"></div>

  <button class="invest" id="invest">Invest</button>
  <div class="actnote" id="actnote"></div>

  <div class="sect">What you own</div>
  <div id="holds"></div>
</div>

<script>
const api = () => window.pywebview.api;
const $ = (id) => document.getElementById(id);
const money = (x) => '$' + Math.abs(Number(x||0)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const signed = (x) => (Number(x)>=0?'+':'−') + money(x);

async function refresh() {
  const [d, cfg, plan, news] = await Promise.all([
    api().get_dashboard(), api().get_config(), api().get_plan(), api().get_news_alerts()]);

  // hero
  $('hero').className = 'hero ' + d.direction;
  $('big').textContent = money(d.total_value);
  const cls = d.direction==='up'?'up':(d.direction==='down'?'down':'flatc');
  const arrow = d.direction==='up'?'▲':(d.direction==='down'?'▼':'•');
  $('pl').innerHTML = `<span class="${cls}">${arrow} ${signed(d.total_pl)} (${d.total_pl_pct>=0?'+':''}${d.total_pl_pct}%)</span> <span class="flatc" style="font-size:13px">all time</span>`;
  $('today').innerHTML = d.today_pl ? `Today <span class="${d.today_pl>=0?'up':'down'}">${signed(d.today_pl)}</span>` : `You've put in ${money(d.invested)}`;
  drawSpark(d.points, d.direction);

  // what's moving it
  const mv = $('move'); mv.innerHTML='';
  if (d.leader || d.laggard) {
    if (d.leader) mv.insertAdjacentHTML('beforeend',
      `<div class="box"><div class="lbl">🟢 Leading</div><div class="nm">${d.leader.name}</div><div class="amt up">${signed(d.leader.amount)}</div></div>`);
    if (d.laggard) mv.insertAdjacentHTML('beforeend',
      `<div class="box"><div class="lbl">🔴 Dragging</div><div class="nm">${d.laggard.name}</div><div class="amt down">${signed(d.laggard.amount)}</div></div>`);
  }

  // tier + mode pills
  $('tierPill').textContent = plan.tier ? ('Plan: ' + plan.tier.label) : 'Plan';
  const mp = $('modePill');
  if (d.mode==='live'){ mp.textContent='LIVE'; mp.className='pill live'; }
  else if (d.mode==='paper'){ mp.textContent = d.broker_connected?'Paper':'Paper · setup'; mp.className='pill '+(d.broker_connected?'ok':''); }
  else { mp.textContent='Practice'; mp.className='pill'; }

  // one big action
  $('invest').textContent = `Invest ${money(cfg.contribution)}`;

  // risk alert (only when it matters)
  if (news.should_pause_recommended){ $('alert').style.display='block';
    $('alert').textContent = `⚠ ${news.n_risk_alerts} risk alert — consider waiting before you invest.`; }
  else $('alert').style.display='none';

  // holdings
  const h = $('holds'); h.innerHTML='';
  if (!d.holdings.length){ h.innerHTML='<div class="empty">Nothing yet — tap Invest to start building.</div>'; return; }
  for (const a of d.holdings){
    const up = a.plpc>=0;
    h.insertAdjacentHTML('beforeend',
      `<div class="hold"><div><div class="nm">${a.name}</div><div class="qty">${a.symbol}</div></div>
       <div class="rt"><div class="v">${money(a.value)}</div>
       <div class="ch ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(a.plpc)}%</div></div></div>`);
  }
}

function drawSpark(pts, dir){
  const s=$('spark'), W=460, H=54, pad=3;
  if(!pts || pts.length<2){ s.innerHTML=''; return; }
  const v=pts.map(p=>p.value), mx=Math.max(...v,1), mn=Math.min(...v,0);
  const X=i=>pad+(W-2*pad)*i/(pts.length-1), Y=val=>H-pad-(H-2*pad)*((val-mn)/(mx-mn||1));
  const line=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.value).toFixed(1)}`).join(' ');
  const col=dir==='down'?'#f6465d':'#27c08a';
  s.innerHTML=`<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity="0.25"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${X(0).toFixed(1)},${H-pad} ${line} ${X(pts.length-1).toFixed(1)},${H-pad}" fill="url(#sg)"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2"/>`;
}

async function invest(){ $('invest').disabled=true; $('actnote').textContent='Investing…';
  try { const r=await api().approve_plan_paper(); $('actnote').textContent=`Done · ${r.n_fills||0} order(s) placed.`; }
  catch(e){ $('actnote').textContent='Could not invest — check connection.'; }
  await refresh(); $('invest').disabled=false; }

window.addEventListener('pywebviewready', refresh);
$('invest').addEventListener('click', invest);
setTimeout(()=>{ if(!window.pywebview) $('modePill').textContent='open via app'; }, 1200);
</script>
</body>
</html>
