<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Accumulator</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --line:#2a2f3a; --txt:#e6e9ef; --dim:#9aa3b2;
          --buy:#3ad29f; --sell:#ff6b6b; --accent:#5b8cff; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:var(--bg); color:var(--txt); }
  header { display:flex; align-items:center; justify-content:space-between;
           padding:16px 22px; border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0; letter-spacing:.3px; }
  .badge { font-size:11px; padding:3px 9px; border-radius:20px; background:#3a2a2a; color:#ffb4b4; }
  .badge.ok { background:#23362e; color:var(--buy); }
  main { padding:22px; display:grid; gap:18px; max-width:880px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--dim);
             margin:0 0 12px; }
  .value { font-size:30px; font-weight:600; }
  .sub { color:var(--dim); font-size:12px; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:right; padding:7px 6px; border-bottom:1px solid var(--line); }
  th:first-child,td:first-child { text-align:left; }
  th { color:var(--dim); font-weight:500; font-size:11px; text-transform:uppercase; }
  .drift-pos { color:var(--sell); } .drift-neg { color:var(--buy); }
  .side-BUY { color:var(--buy); } .side-SELL { color:var(--sell); }
  .row { display:flex; gap:12px; align-items:center; }
  .row > .card { flex:1; }
  button { font:inherit; border:0; border-radius:9px; padding:11px 18px; cursor:pointer;
           background:var(--accent); color:#fff; font-weight:600; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  .note { color:var(--dim); font-size:12px; margin-top:10px; }
  input { background:#11141a; border:1px solid var(--line); color:var(--txt);
          border-radius:8px; padding:8px 10px; width:110px; font:inherit; }
</style>
</head>
<body>
<header>
  <h1>Accumulator · <span id="profile" class="sub"></span></h1>
  <span id="govBadge" class="badge">…</span>
</header>
<main>
  <div class="row">
    <div class="card">
      <h2>Portfolio value</h2>
      <div class="value" id="pv">—</div>
      <div class="sub" id="cash"></div>
    </div>
    <div class="card">
      <h2>Contribution</h2>
      <div class="row" style="gap:8px">
        <input id="contrib" type="number" value="100" min="0" step="10"/>
        <button id="planBtn">Plan</button>
      </div>
      <div class="sub" style="margin-top:8px">Weekly DCA · overlay off</div>
    </div>
  </div>

  <div class="card">
    <h2>Allocation — target vs current</h2>
    <table id="allocTbl"><thead>
      <tr><th>Asset</th><th>Target</th><th>Current</th><th>Drift</th><th>Value</th></tr>
    </thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h2>This period&rsquo;s plan</h2>
    <table id="planTbl"><thead>
      <tr><th>Side</th><th>Asset</th><th>Amount</th><th>Reason</th></tr>
    </thead><tbody></tbody></table>
    <div style="margin-top:14px" class="row">
      <button id="approveBtn">Approve (paper)</button>
      <span class="note" id="approveNote"></span>
    </div>
    <div class="note" id="govNote"></div>
  </div>

  <div class="card">
    <h2>News &amp; risk <span class="sub">(advisory only — never a buy/sell signal)</span></h2>
    <div id="newsBody" class="sub">…</div>
  </div>
</main>

<script>
const api = () => window.pywebview.api;
const $ = (id) => document.getElementById(id);
const money = (x) => '$' + Number(x).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = (x) => (x*100).toFixed(1) + '%';

async function refresh() {
  const [st, cfg] = await Promise.all([api().get_status(), api().get_config()]);
  $('profile').textContent = cfg.profile;
  $('pv').textContent = money(st.portfolio_value);
  $('cash').textContent = 'cash ' + money(st.cash);
  const armed = st.stop_trading_armed;
  $('govBadge').textContent = armed ? 'STOP_TRADING armed · no live' : 'live disabled';
  $('govBadge').className = 'badge' + (armed ? '' : ' ok');
  await loadPlan();
}

async function loadPlan() {
  const contribution = Number($('contrib').value) || 0;
  const plan = await api().get_plan(contribution);
  // allocation table
  const at = $('allocTbl').querySelector('tbody'); at.innerHTML = '';
  const status = await api().get_status();
  for (const s of Object.keys(plan.target_weights)) {
    const d = plan.drift[s];
    at.insertAdjacentHTML('beforeend',
      `<tr><td>${s}</td><td>${pct(plan.target_weights[s])}</td>
       <td>${pct(plan.current_weights[s])}</td>
       <td class="${d>0?'drift-pos':'drift-neg'}">${d>0?'+':''}${pct(d)}</td>
       <td>${money((status.holdings_value||{})[s]||0)}</td></tr>`);
  }
  // plan table
  const pt = $('planTbl').querySelector('tbody'); pt.innerHTML = '';
  if (!plan.orders.length) pt.innerHTML = '<tr><td colspan="4" class="sub">No orders.</td></tr>';
  for (const o of plan.orders) {
    pt.insertAdjacentHTML('beforeend',
      `<tr><td class="side-${o.side}">${o.side}</td><td>${o.symbol}</td>
       <td>${money(o.dollars)}</td><td class="sub">${o.reason}</td></tr>`);
  }
  $('govNote').textContent = plan.note;
  loadNews();
}

async function loadNews() {
  const body = $('newsBody');
  try {
    const s = await api().get_news_alerts();
    if (s.should_pause_recommended) {
      let html = `<div style="color:var(--sell);font-weight:600">⚠ ${s.n_risk_alerts} risk alert(s) — review before next contribution (pause recommended)</div>`;
      for (const a of s.risk_alerts.slice(0,6))
        html += `<div style="margin-top:6px">[${a.date}] <b>${a.symbol}</b> — ${a.headline} <span class="sub">(${a.matched})</span></div>`;
      body.innerHTML = html;
    } else {
      body.innerHTML = `Scanned ${s.n_scanned} recent headlines · no critical events for the basket. `
        + `<span class="sub">${s.n_watches} watch item(s).</span>`;
    }
  } catch (e) { body.textContent = 'News feed unavailable (fetch crypto_news.jsonl to enable).'; }
}

async function approve() {
  $('approveBtn').disabled = true;
  const contribution = Number($('contrib').value) || 0;
  const res = await api().approve_plan_paper(contribution);
  $('approveNote').textContent = `Simulated ${res.n_fills} fills · new value ${money(res.portfolio_value)}`;
  await refresh();
  $('approveBtn').disabled = false;
}

window.addEventListener('pywebviewready', refresh);
$('planBtn').addEventListener('click', loadPlan);
$('approveBtn').addEventListener('click', approve);
// fallback if served outside pywebview
setTimeout(() => { if (!window.pywebview) $('govBadge').textContent = 'open via app_main.py'; }, 1200);
</script>
</body>
</html>
