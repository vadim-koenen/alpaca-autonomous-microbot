# =============================================================
# Coinbase Crypto-Only Config
# =============================================================
# Use this config when running the Coinbase broker (BROKER=coinbase).
# Equities, options, margin, and short selling are ALL disabled —
# Coinbase only supports crypto spot trading.
#
# IMPORTANT — NO PAPER MODE:
#   Coinbase has no paper/sandbox endpoint. Use mode: dry_run for
#   safe simulation (no orders placed). When ready for real money,
#   change to mode: live and ensure LIVE_TRADING=true in .env.
#
# Usage:
#   CONFIG_FILE=config_coinbase_crypto.yaml BROKER=coinbase python main.py --mode dry_run
#   CONFIG_FILE=config_coinbase_crypto.yaml BROKER=coinbase python main.py --mode live

# ── Runtime mode ─────────────────────────────────────────────
mode: live       # LIVE: real Coinbase crypto orders allowed only with LIVE_TRADING=true

# ── Account expectations ─────────────────────────────────────
account:
  expected_starting_equity: 8.00
  disable_live_below_equity: 1.50
  do_not_auto_increase_size_until_equity: 20.00
  timezone: America/Chicago

# ── Live-trading master gates ─────────────────────────────────
live_trading:
  enabled: true
  require_env_live_trading_true: true
  allow_crypto: true               # ENABLED — Coinbase is crypto-only
  allow_equities: false            # Not supported on Coinbase
  allow_long_options: false        # Not supported on Coinbase
  allow_short_selling: false       # Not supported on Coinbase
  allow_margin: false              # Not supported on Coinbase

# ── Global risk limits ────────────────────────────────────────
global_risk:
  max_daily_loss_usd: 3.00          # P2-001: raised from 2.00
  max_trades_per_day: 12            # P2-001: raised to 12
  stop_after_consecutive_losses: 3  # P2-001: raised from 2
  max_open_positions: 2             # P2-001: absolute max 2
  max_total_live_exposure_usd: 6.00
  no_new_trades_after_market_time: "23:55"
  force_flat_before_market_close: false
  force_flat_time: "23:58"
  never_hold_options_through_expiration: false
  max_api_errors_before_halt: 10
  max_close_failures: 3

# ── Crypto ───────────────────────────────────────────────────
crypto:
  enabled: true
  live_enabled: true
  live_symbols:
    - BTC/USD
    - ETH/USD
    - SOL/USD
  watch_only_symbols: []
  symbols:
    - BTC/USD
    - ETH/USD
    - SOL/USD
  max_trade_notional_usd: 2.00
  max_total_crypto_exposure_usd: 6.00 # P2-001: absolute max 6.00
  min_trade_notional_usd: 0.50
  max_spread_pct_per_symbol:
    BTC/USD: 0.10
    ETH/USD: 0.15
    SOL/USD: 0.20
  max_spread_pct: 0.20    # global fallback
  stale_data_seconds: 90
  use_limit_orders: true
  allow_market_orders: false
  stop_loss_pct: 1.50
  take_profit_pct: 3.00
  max_position_minutes: 90
  passive_limit_entries: true
  buying_power_safety_buffer: 0.85
  use_atr_exits: true
  bars_limit: 100
  min_bars_required: 60
  slippage_estimate_pct: 0.05

  # ── Controlled Coinbase Exploration (P2-001) ────────────────
  # Purpose: rotate micro-probes across multiple symbols (BTC, ETH, SOL)
  # to gather diverse live shadow data.
  # Default is OFF, but now ENABLED for P2-001 rollout.
  controlled_exploration:
    enabled: true
    approved_symbols:
      - BTC/USD
      - ETH/USD
      - SOL/USD
    max_single_trade_notional_usd: 1.00
    max_total_exploration_exposure_usd: 6.00
    max_round_trips_per_day: 12
    max_entries_per_symbol_per_day: 4
    per_symbol_cooldown_minutes: 30
    max_consecutive_losses: 3
    daily_stop_loss_usd: 3.00
    rotate_symbols: true
    avoid_same_symbol_repeat: true
    disable_legacy_btc_probe_when_enabled: true

  # ── Legacy micro probe mode ─────────────────────────────────
  # legacy probe is disabled when controlled exploration is enabled
  coinbase_probe_enabled: true
  coinbase_probe_symbols:
    - BTC/USD
  coinbase_probe_regimes:
    - dead_chop
  coinbase_probe_notional_usd: 0.50
  coinbase_probe_min_minutes_between_trades: 60
  coinbase_probe_stop_loss_pct: 1.50
  coinbase_probe_take_profit_pct: 3.25
  coinbase_probe_max_spread_pct: 0.10
  coinbase_probe_buying_power_buffer: 0.80
  coinbase_probe_min_confidence_score: 0.60

  # ── Dynamic Equity-Based Position Sizing (P2-004) ──────────
  # Coinbase controlled_exploration notional only; Alpaca/equity strategies unchanged.
  # daily_stop_loss_pct / max_exposure_pct helpers are ADVISORY (not live risk gates).
  # Trade size never exceeds controlled_exploration.max_single_trade_notional_usd.
  dynamic_sizing:
    enabled: true
    # Position size as % of current equity
    position_size_pct: 2.5
    # Never trade less than this (protects against dust trades)
    min_notional_usd: 1.00
    # Never trade more than this regardless of equity (hard safety cap)
    max_notional_usd: 25.00
    # Only scale above this equity level (below = always use min_notional)
    scaling_threshold_usd: 20.00
    # Daily stop loss as % of equity (7.5% = $3 on $40 account — same as now)
    daily_stop_loss_pct: 7.5
    # Max total exposure as % of equity (15% = $6 on $40 — same as now)
    max_exposure_pct: 15.0

  # ── Opt-in Micro-Size Multi-Asset Spot Live Expansion (P2-012C) ─────
  # DEFAULT: DISABLED. Current live_symbols (BTC/USD, ETH/USD, SOL/USD) + behavior UNCHANGED.
  # This is the explicit opt-in path for controlled expansion of Coinbase SPOT CRYPTO only.
  #
  # Requirements for any new symbol to trade live:
  #   - multi_asset_spot.enabled: true
  #   - symbol must be in the explicit allow_live_trading_symbols list below
  #   - must pass ALL hard filters in the selector (spot_crypto only, no perps/futures/gold/silver/commodity/leverage/disabled/bad quote)
  #   - spread <= max_spread_bps
  #   - within max_symbols and daily new limit (advisory)
  #
  # Micro-size only: new symbols use the *existing* max_trade_notional_usd / min_trade_notional_usd.
  # Total exposure and other risk caps are unchanged (use existing fields).
  # TP/SL/hold time unchanged.
  # Prediction telemetry remains fully enabled for all scanned symbols (including expanded).
  # No derivatives, no leverage, no gold/silver, no commodities.
  #
  # Dry-run / preview:
  #   python3 scripts/coinbase_multi_asset_candidates.py --show-expansion
  #
  # To enable (example):
  #   multi_asset_spot:
  #     enabled: true
  #     allow_live_trading_symbols:
  #       - ADA/USD
  #       - AVAX/USD
  #     ...
  multi_asset_spot:
    enabled: false
    max_symbols: 8
    allowed_quote_currencies:
      - USD
      - USDC
    exclude_product_types:
      - perpetual_future
      - expiring_future
      - commodity_linked_derivative
      - unknown
    max_spread_bps: 50          # 0.50% — conservative; tighter than some legacy probe
    allow_live_trading_symbols: []   # EXPLICIT ALLOWLIST — required. Nothing outside this + current live will ever trade.
    max_new_symbols_per_day: 2
    # micro notional and exposure continue to be governed by the existing
    # max_trade_notional_usd / max_total_crypto_exposure_usd etc. (no increase here)

# ── Fee model ─────────────────────────────────────────────────
fees:
  venue: "coinbase_advanced"
  maker_fee_pct: 0.006      # 0.60% (Intro 1 tier)
  taker_fee_pct: 0.012      # 1.20%
  require_expected_edge_pct: 0.005
  require_worst_case_edge_positive: true

# ── Risk thresholds ───────────────────────────────────────────
risk:
  min_reward_risk_ratio: 1.8
  require_stop_loss: true
  require_take_profit: true

# ── Strategy behaviour ────────────────────────────────────────
strategy_thresholds:
  use_regime_filter: true
  use_atr_exits: true
  confidence_threshold:
    momentum_breakout: 0.72
    ema_crossover: 0.70
    mean_reversion: 0.74
    coinbase_probe: 0.60
    coinbase_exploration: 0.60

strategy:
  allow_autonomous_selection: true
  prefer_no_trade_when_unclear: true
  crypto_strategies:
    - momentum_breakout
    - mean_reversion
    - ema_crossover
  min_confidence_score: 0.68
  lookback_bars: 20
  crypto_timeframe: "15Min"

# ── Logging ───────────────────────────────────────────────────
logging:
  journal_file: journal_coinbase_crypto.csv
  log_dir: logs
  report_dir: reports
  log_skipped_trades: true
  log_market_snapshot: true
  daily_report: true
  log_level: INFO
